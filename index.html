<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 🎂</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffd1ff,#b5e8ff);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

/* Animated Background */

@keyframes bgMove{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

#background,
#stars,
#sparkles,
#balloons,
#fireworks,
#confetti{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

overflow:hidden;

}

/* Glass Card */
.card{

width:90%;
max-width:520px;
padding:35px;
text-align:center;
border-radius:25px;

background:rgba(255,255,255,.22);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.4);

box-shadow:
0 10px 40px rgba(0,0,0,.25);

animation:
cardFloat 4s ease-in-out infinite,
cardRotate 10s ease-in-out infinite;

z-index:10;

}
  @keyframes cardFloat{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

}
  @keyframes cardRotate{

0%,100%{

transform:
translateY(0)
rotateY(0deg);

}

50%{

transform:
translateY(-12px)
rotateY(6deg);

}

}

/* Heading */

h1{

font-size:46px;

color:white;

text-shadow:

0 0 10px #ff69b4,

0 0 25px deeppink,

0 0 45px hotpink;

margin-bottom:20px;

animation:titleGlow 2s infinite alternate;

}

@keyframes titleGlow{

from{

transform:scale(1);

}

to{

transform:scale(1.04);

}

}

/* Paragraph */

p{

font-size:20px;

line-height:1.8;

color:white;

margin-bottom:30px;

}

/* Buttons */

.buttons{

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

}

button{

padding:14px 28px;

font-size:18px;

border:none;

border-radius:40px;

cursor:pointer;

background:linear-gradient(45deg,#ff1493,#ff69b4);

color:white;

font-weight:bold;

transition:.35s;

box-shadow:

0 8px 20px rgba(255,20,147,.35);

}

button:hover{

transform:translateY(-6px) scale(1.05);

box-shadow:

0 12px 30px rgba(255,20,147,.55);

}

/* Gift Popup */

#giftPopup{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.55);

justify-content:center;

align-items:center;

flex-direction:column;

z-index:500;

}

.giftBox{

font-size:120px;

animation:giftBounce 1s infinite;

}

@keyframes giftBounce{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-15px);

}

}

#giftPopup h2{

color:white;

font-size:40px;

margin-top:20px;

text-align:center;

}

/* Cake Scene */

#cakeScene{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.75);

justify-content:center;

align-items:center;

flex-direction:column;

z-index:900;

}

#countdown{

font-size:100px;

font-weight:bold;

color:white;

margin-bottom:40px;

text-shadow:

0 0 20px gold,

0 0 40px orange;

}
  /* ---------- STARS ---------- */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
box-shadow:0 0 12px white;
animation:twinkle linear infinite;
}

@keyframes twinkle{

0%,100%{
opacity:.2;
transform:scale(.8);
}

50%{
opacity:1;
transform:scale(1.8);
}

}

/* ---------- SPARKLES ---------- */

.sparkle{

position:absolute;

width:8px;

height:8px;

background:white;

transform:rotate(45deg);

box-shadow:0 0 15px white;

animation:sparkleMove linear infinite;

}

@keyframes sparkleMove{

0%{

transform:
translateY(0)
rotate(0deg);

opacity:1;

}

100%{

transform:
translateY(-150px)
rotate(360deg);

opacity:0;

}

}

/* ---------- BALLOONS ---------- */

.balloon{

position:absolute;

bottom:-180px;

width:65px;

height:80px;

border-radius:50%;

animation:balloonUp linear infinite;

}

.balloon::before{

content:"";

position:absolute;

left:31px;

top:80px;

width:2px;

height:90px;

background:white;

}

@keyframes balloonUp{

0%{

transform:
translateY(0);

}

100%{

transform:
translateY(-130vh);

}

}

/* ---------- HEARTS ---------- */

.heart{

position:absolute;

color:#ff3b7a;

font-size:22px;

animation:heartFloat linear infinite;

}

@keyframes heartFloat{

0%{

transform:
translateY(0)
scale(.7);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:
translateY(-120vh)
scale(1.5);

opacity:0;

}

}
  /* ========================= */
/* FIREWORKS */
/* ========================= */

.firework{

position:absolute;

width:8px;

height:8px;

border-radius:50%;

animation:explode 1.2s linear forwards;

}

@keyframes explode{

0%{

transform:translate(0,0) scale(.2);

opacity:1;

}

100%{

transform:
translate(var(--x),var(--y))
scale(1.5);

opacity:0;

}

}

/* ========================= */
/* GIFT */
/* ========================= */

.giftBox{

cursor:pointer;

user-select:none;

transition:.3s;

}

.giftShake{

animation:giftShake .4s infinite;

}

@keyframes giftShake{

0%{transform:rotate(0deg);}

25%{transform:rotate(-6deg);}

50%{transform:rotate(6deg);}

75%{transform:rotate(-4deg);}

100%{transform:rotate(0deg);}

}

/* ========================= */
/* SCREEN FLASH */
/* ========================= */

.flash{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:white;

opacity:0;

pointer-events:none;

z-index:99999;

}

.flashShow{

animation:flash .45s;

}

@keyframes flash{

0%{opacity:0;}

50%{opacity:.9;}

100%{opacity:0;}

}
  /* ========================= */
/* PROFESSIONAL CAKE */
/* ========================= */

.cake{

position:relative;

width:260px;

height:280px;

animation:cakeFloat 3s ease-in-out infinite;

}

@keyframes cakeFloat{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-12px);

}

}

.cake-shadow{

position:absolute;

bottom:-8px;

left:25px;

width:210px;

height:18px;

background:rgba(0,0,0,.25);

filter:blur(8px);

border-radius:50%;

}

.plate{

position:absolute;

bottom:0;

left:20px;

width:220px;

height:22px;

background:#f3f3f3;

border-radius:50%;

}

.layer{
position:absolute;
left:50%;
transform:translateX(-50%);
border-radius:22px;
box-shadow:
inset 0 -8px rgba(0,0,0,.12),
inset 0 6px rgba(255,255,255,.25),
0 8px 12px rgba(0,0,0,.18);
}

.top{
bottom:136px;
width:135px;
height:50px;
background:linear-gradient(#ffd4e6,#ffb7d4);
}

.middle{
bottom:82px;
width:175px;
height:60px;
background:linear-gradient(#ff8dc2,#ff63ab);
}

.bottom{
bottom:20px;
width:220px;
height:72px;
background:linear-gradient(#ff3f92,#ff0f78);
}
.icing{

position:absolute;

bottom:168px;

left:50%;

transform:translateX(-50%);

width:140px;

height:22px;

background:white;

border-radius:50px;

box-shadow:
0 4px 8px rgba(0,0,0,.15);

}

.drip{

position:absolute;

background:white;

border-radius:0 0 15px 15px;

}

.d1{

left:82px;

bottom:150px;

width:16px;

height:35px;

}

.d2{

left:115px;

bottom:142px;

width:20px;

height:44px;

}

.d3{

left:150px;

bottom:150px;

width:16px;

height:30px;

}

.d4{

left:182px;

bottom:145px;

width:18px;

height:38px;

}

.cherry{

position:absolute;

width:20px;

height:20px;

background:radial-gradient(circle at 30% 30%,#ff7070,#b30000);

border-radius:50%;

box-shadow:

0 0 10px red,

0 2px 6px rgba(0,0,0,.3);

}

.ch1{

left:88px;

bottom:184px;

}

.ch2{

left:122px;

bottom:196px;

}

.ch3{

left:158px;

bottom:184px;

}

.candle{

position:absolute;

left:123px;

bottom:184px;

width:12px;

height:55px;

background:
repeating-linear-gradient(
45deg,
#87cefa 0 6px,
white 6px 12px
);

border-radius:5px;

}

.flame{

position:absolute;

left:-3px;

top:-24px;

width:18px;

height:28px;

background:radial-gradient(circle,#fff8a0,#ffd700,#ff8800);

border-radius:50% 50% 60% 60%;

box-shadow:

0 0 25px orange,

0 0 45px gold;

animation:flicker .18s infinite alternate;

}

@keyframes flicker{

from{

transform:
scale(1)
rotate(-2deg);

}

to{

transform:
scale(.82)
rotate(3deg);

}

}
  /* ========= Cake Entrance ========= */

#cakeContainer{

animation:cakeEnter 1.2s ease;

}

@keyframes cakeEnter{

0%{

opacity:0;

transform:translateY(250px) scale(.4);

}

70%{

transform:translateY(-20px) scale(1.1);

}

100%{

opacity:1;

transform:translateY(0) scale(1);

}

}

/* ========= Cake Glow ========= */

.cake{

filter:drop-shadow(0 0 25px hotpink);

}

/* ========= Sparkles ========= */

.spark{

position:absolute;

width:8px;

height:8px;

background:white;

border-radius:50%;

box-shadow:0 0 20px white;

animation:sparkDance 2s infinite;

}

.sp1{top:10px;left:-20px;}
.sp2{top:60px;right:-15px;}
.sp3{top:120px;left:-35px;}
.sp4{top:150px;right:-25px;}
.sp5{top:210px;left:-10px;}
.sp6{top:220px;right:-10px;}

@keyframes sparkDance{

0%,100%{

opacity:.2;

transform:scale(.5);

}

50%{

opacity:1;

transform:scale(1.8);

}

}

/* ========= Smoke ========= */

.smoke{

position:absolute;

width:12px;

height:12px;

background:white;

border-radius:50%;

opacity:0;

animation:smokeRise 3s infinite;

}

.s1{

left:-2px;

top:-32px;

animation-delay:.3s;

}

.s2{

left:10px;

top:-38px;

animation-delay:1s;

}

.s3{

left:4px;

top:-28px;

animation-delay:1.8s;

}

@keyframes smokeRise{

0%{

opacity:0;

transform:translateY(0) scale(.3);

}

25%{

opacity:.5;

}

100%{

opacity:0;

transform:translateY(-60px) translateX(15px) scale(2);

}

}
  /* ========================= */
/* GOLD PARTICLES */
/* ========================= */

.goldParticle{

position:fixed;

width:6px;

height:6px;

border-radius:50%;

background:gold;

box-shadow:0 0 15px gold;

pointer-events:none;

animation:goldRain linear forwards;

}

@keyframes goldRain{

0%{

transform:translateY(-30px) scale(.5);

opacity:1;

}

100%{

transform:translateY(110vh) scale(1.3);

opacity:0;

}

}

/* ========================= */
/* RAINBOW GLOW */
/* ========================= */

@keyframes rainbowGlow{

0%{

filter:drop-shadow(0 0 20px hotpink);

}

25%{

filter:drop-shadow(0 0 20px cyan);

}

50%{

filter:drop-shadow(0 0 20px gold);

}

75%{

filter:drop-shadow(0 0 20px lime);

}

100%{

filter:drop-shadow(0 0 20px hotpink);

}

}

.cake{

animation:

cakeFloat 3s ease-in-out infinite,

rainbowGlow 5s linear infinite;

}

/* ========================= */
/* 3D ROTATION */
/* ========================= */

@keyframes rotateCake{

0%{

transform:
perspective(700px)
rotateY(0deg);

}

50%{

transform:
perspective(700px)
rotateY(12deg);

}

100%{

transform:
perspective(700px)
rotateY(0deg);

}

}

#cakeContainer{

animation:
cakeEnter 1.2s ease,
rotateCake 6s ease-in-out infinite;

}

/* ========================= */
/* FLOATING WISHES */
/* ========================= */

.wish{

position:fixed;

font-size:30px;

font-weight:bold;

color:white;

text-shadow:0 0 20px hotpink;

pointer-events:none;

animation:wishFloat 6s linear forwards;

}

@keyframes wishFloat{

0%{

transform:
translateY(0)
scale(.5);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:
translateY(-400px)
scale(1.2);

opacity:0;

}

}
  /* =======================
   GRAND FINALE
======================= */

.finaleText{

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

font-size:70px;

font-weight:bold;

color:white;

text-shadow:
0 0 20px hotpink,
0 0 40px deeppink,
0 0 70px gold;

opacity:0;

pointer-events:none;

z-index:999999;

animation:finaleText 4s forwards;

}

@keyframes finaleText{

0%{

opacity:0;

transform:translate(-50%,-50%) scale(.3);

}

20%{

opacity:1;

transform:translate(-50%,-50%) scale(1.2);

}

80%{

opacity:1;

}

100%{

opacity:0;

transform:translate(-50%,-50%) scale(2);

}
}
  .sprinkle{

position:absolute;

width:12px;

height:4px;

border-radius:4px;

}

.s1{
background:#00d4ff;
left:82px;
bottom:110px;
transform:rotate(22deg);
}

.s2{
background:yellow;
left:132px;
bottom:118px;
transform:rotate(-18deg);
}

.s3{
background:lime;
left:162px;
bottom:96px;
transform:rotate(30deg);
}

.s4{
background:#ff66ff;
left:106px;
bottom:72px;
transform:rotate(-25deg);
}

.s5{
background:white;
left:160px;
bottom:62px;
transform:rotate(18deg);
}

.s6{
background:#00ffff;
left:94px;
bottom:50px;
transform:rotate(-20deg);
}

.s7{
background:orange;
left:145px;
bottom:42px;
transform:rotate(26deg);
}

.s8{
background:#99ff66;
left:178px;
bottom:84px;
transform:rotate(-15deg);
}
  .bubble{
position:fixed;
bottom:-60px;
width:20px;
height:20px;
border-radius:50%;
background:rgba(255,255,255,.35);
backdrop-filter:blur(4px);
animation:bubbleRise linear forwards;
pointer-events:none;
}

@keyframes bubbleRise{

0%{
transform:translateY(0) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(2);
opacity:0;
}

}
  .clickPop{

animation:clickPop .3s;

}

@keyframes clickPop{

0%{
transform:scale(1);
}

50%{
transform:scale(.85);
}

100%{
transform:scale(1);
}

}
</style>

</head>

<body>

<!-- Animated Background -->

<div id="background"></div>

<div id="stars"></div>

<div id="sparkles"></div>

<div id="balloons"></div>

<div id="fireworks"></div>

<div id="confetti"></div>

<!-- Birthday Card -->

<div class="card">

<h1>
🎂 Happy Birthday Bro! 🎂
</h1>

<p>

May this year bring you happiness,
success, health and unforgettable
memories.

Keep smiling and keep shining!

🎉🎉🎉

</p>

<div class="buttons">

<button id="giftBtn">

🎁 Gift

</button>

<button id="celebrateBtn">

🎊 Celebrate

</button>

<button id="musicBtn">

🎵 Music

</button>

</div>

</div>

<!-- Gift Popup -->

<div id="giftPopup">

<div class="giftBox">

🎁

</div>

<h2>

Have an Amazing Birthday!

🎉

</h2>

</div>

<!-- Cake Scene -->
<div id="cakeScene">

    <div id="countdown">
        3
    </div>

    <div id="cakeContainer">

        <div class="cake">

            <div class="cake-shadow"></div>

            <div class="plate"></div>

            <div class="layer bottom"></div>

            <div class="layer middle"></div>

            <div class="layer top"></div>

            <div class="icing"></div>

            <div class="drip d1"></div>
            <div class="drip d2"></div>
            <div class="drip d3"></div>
            <div class="drip d4"></div>

            <div class="cherry ch1"></div>
            <div class="cherry ch2"></div>
            <div class="cherry ch3"></div>

            <div class="candle">
                <div class="flame"></div>

                <div class="smoke s1"></div>
                <div class="smoke s2"></div>
                <div class="smoke s3"></div>
            </div>

            <div class="sprinkle s1"></div>
            <div class="sprinkle s2"></div>
            <div class="sprinkle s3"></div>
            <div class="sprinkle s4"></div>
            <div class="sprinkle s5"></div>
            <div class="sprinkle s6"></div>
            <div class="sprinkle s7"></div>
            <div class="sprinkle s8"></div>

        </div>

    </div>

</div>

<div id="flash" class="flash"></div>
<audio
id="music"
src="happy-birthday.mp3">
</audio>

<script>

// ⭐ Stars

for(let i=0;i<120;i++){

const star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

star.style.animationDuration=
(2+Math.random()*4)+"s";

document.getElementById("stars")
.appendChild(star);

}

// ✨ Sparkles

for(let i=0;i<35;i++){

const s=document.createElement("div");

s.className="sparkle";

s.style.left=Math.random()*100+"vw";

s.style.top=(50+Math.random()*50)+"vh";

s.style.animationDuration=
(3+Math.random()*3)+"s";

document.getElementById("sparkles")
.appendChild(s);

}

// 🎈 Balloons

const colors=[
"#ff4d6d",
"#4dabff",
"#ffd43b",
"#69db7c",
"#da77f2",
"#ff922b"
];

for(let i=0;i<18;i++){

const b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background=
colors[Math.floor(Math.random()*colors.length)];

b.style.animationDuration=
(8+Math.random()*6)+"s";

b.style.animationDelay=
(Math.random()*6)+"s";

document.getElementById("balloons")
.appendChild(b);

}

// ❤️ Hearts

setInterval(()=>{

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.bottom="-40px";

h.style.animationDuration=
(4+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},7000);

},500);
  // 🎇 Fireworks

function firework(x,y){

const colors=[
"#ff1744",
"#ffd600",
"#00e676",
"#2979ff",
"#ff9100",
"#d500f9"
];

for(let i=0;i<60;i++){

const p=document.createElement("div");

p.className="firework";

p.style.left=x+"px";

p.style.top=y+"px";

p.style.background=
colors[Math.floor(Math.random()*colors.length)];

const angle=Math.random()*360;

const distance=80+Math.random()*140;

p.style.setProperty(
"--x",
Math.cos(angle*Math.PI/180)*distance+"px"
);

p.style.setProperty(
"--y",
Math.sin(angle*Math.PI/180)*distance+"px"
);

document.body.appendChild(p);

setTimeout(()=>{

p.remove();

},1300);

}

}

// 🎊 Confetti Burst

function confettiBurst(){

for(let i=0;i<250;i++){

const c=document.createElement("div");

c.style.position="fixed";

c.style.left=Math.random()*100+"vw";

c.style.top="-20px";

c.style.width="8px";

c.style.height="14px";

c.style.background=
`hsl(${Math.random()*360},100%,60%)`;

c.style.transform=
`rotate(${Math.random()*360}deg)`;

c.style.transition="4s linear";

document.body.appendChild(c);

setTimeout(()=>{

c.style.top="110vh";

c.style.left=
Math.random()*100+"vw";

},20);

setTimeout(()=>{

c.remove();

},4200);

}

}

// ⚡ Flash

function screenFlash(){

const flash=
document.getElementById("flash");

flash.classList.add("flashShow");

setTimeout(()=>{

flash.classList.remove("flashShow");

},450);

  }




// 🌟 Gold Rain

setInterval(()=>{

const p=document.createElement("div");

p.className="goldParticle";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(p);

setTimeout(()=>{

p.remove();

},7000);

},120);

// 💖 Floating Wishes

const wishes=[

"Happy Birthday! 🎉",

"Best Wishes ❤️",

"Stay Happy 😊",

"Have Fun 🎂",

"Dream Big ✨",

"Enjoy Your Day 🎈"

];

function showWish(){

const w=document.createElement("div");

w.className="wish";

w.innerHTML=wishes[Math.floor(Math.random()*wishes.length)];

w.style.left=10+Math.random()*80+"vw";

w.style.top=60+Math.random()*20+"vh";

document.body.appendChild(w);

setTimeout(()=>{

w.remove();

},6000);

}

txt.className="finaleText";

document.body.appendChild(txt);

// fireworks

for(let i=0;i<12;i++){

firework(

Math.random()*window.innerWidth,

Math.random()*window.innerHeight*0.6

);

},i*250);

}

screenFlash();

navigator.vibrate?.([120,60,120]);

setTimeout(()=>{

txt.remove();

},4000);

function celebrate(){

const scene=document.getElementById("cakeScene");
const countdown=document.getElementById("countdown");

scene.style.display="flex";
const cake=document.querySelector(".cake");

cake.animate(

[
{transform:"scale(.2) rotate(-25deg)"},
{transform:"scale(1.15) rotate(8deg)"},
{transform:"scale(1)"}
],

{
duration:1200,
easing:"ease-out"
}

);
let num=3;
countdown.innerHTML=num;

screenFlash();

firework(
window.innerWidth/2,
window.innerHeight/2
);

confettiBurst();

const timer=setInterval(()=>{

num--;

if(num>0){

countdown.innerHTML=num;

}
else{

clearInterval(timer);

countdown.innerHTML="🎉";

grandFinale();

}

},1000);

setTimeout(()=>{

scene.style.display="none";

},7000);

}

};

    setTimeout(() => {
        document.getElementById("giftPopup").style.display = "none";
        gift.classList.remove("giftShake");
