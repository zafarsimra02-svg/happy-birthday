<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 🎂</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1ff);

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

}

.card{

width:500px;

background:white;

padding:30px;

border-radius:20px;

text-align:center;

box-shadow:0 0 30px rgba(0,0,0,.3);

animation:float 3s ease-in-out infinite;

position:relative;

z-index:10;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

}

h1{

color:#ff1493;

font-size:42px;

margin-bottom:15px;

animation:glow 1s infinite alternate;

}

@keyframes glow{

from{

text-shadow:0 0 10px pink;

}

to{

text-shadow:0 0 25px deeppink;

}

}

p{

font-size:19px;

color:#555;

line-height:1.5;
text-align:center;

}

button{

margin-top:20px;

padding:12px 25px;

font-size:18px;

border:none;

border-radius:30px;

cursor:pointer;

background:#ff1493;

color:white;

transition:.3s;

}

button:hover{

transform:scale(1.08);

background:#ff4081;

}

.gift{

font-size:70px;

margin-top:20px;

cursor:pointer;

transition:.4s;

}

.gift:hover{

transform:rotate(15deg) scale(1.2);

}

.message{

display:none;

font-size:28px;

margin-top:15px;

color:red;

animation:pop .6s;

}

@keyframes pop{

from{

transform:scale(0);

}

to{

transform:scale(1);

}

}

.balloon{

position:absolute;

bottom:-120px;

width:60px;

height:80px;

border-radius:50%;

animation:rise linear infinite;

}

.balloon::after{

content:"";

position:absolute;

width:2px;

height:70px;

background:white;

left:50%;

top:80px;

}

@keyframes rise{

0%{

transform:translateY(0);

}

100%{

transform:translateY(-120vh);

}

}

.confetti{

position:absolute;

width:10px;

height:10px;

animation:fall 5s linear infinite;

}

@keyframes fall{

0%{

transform:translateY(-100px) rotate(0deg);

}

100%{

transform:translateY(110vh) rotate(720deg);

}

}

.cakeScreen{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.45);

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999;

}

.countdown{

font-size:80px;

font-weight:bold;

color:white;

margin-bottom:20px;

}

.cake{

font-size:180px;

}

.candles{

font-size:50px;

margin-bottom:-25px;

}

</style>

</head>

<body>
  <div class="card">

<h1>🎂 Happy Birthday Bro! 🎂</h1>

<p>
May your life be filled with happiness, success, laughter and unforgettable memories.
I hope today brings you lots of smiles, amazing surprises and a year full of blessings! 🎉
</p>

<div class="gift" onclick="openGift()">
🎁
</div>

<div class="message" id="msg">
🎉 Have an Amazing Birthday! 🎉
</div>

<button onclick="celebrate()">
🎊 Celebrate
</button>

<button onclick="playMusic()">
🎵 Music
</button>

</div>

<div id="cakeScreen" class="cakeScreen">

<div id="countdown" class="countdown">
3
</div>

<div class="candles">
🕯️ 🕯️ 🕯️
</div>

<div class="cake">
🎂
</div>

</div>

<audio id="music" src="happy-birthday.mp3"></audio>

<script>
  for(let i=0;i<20;i++){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background=
"rgb("+
Math.random()*255+","+
Math.random()*255+","+
Math.random()*255+")";

b.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(b);

}

function createConfetti(){

for(let i=0;i<200;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
"rgb("+
Math.random()*255+","+
Math.random()*255+","+
Math.random()*255+")";

c.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},5000);

}

}

function celebrate(){

const screen=document.getElementById("cakeScreen");

const countdown=document.getElementById("countdown");

screen.style.display="flex";

let num=3;

countdown.innerHTML=num;

const timer=setInterval(()=>{

num--;

if(num>0){

countdown.innerHTML=num;

}
else if(num===0){

countdown.innerHTML="🎉";

createConfetti();

clearInterval(timer);

}

},1000);

setTimeout(()=>{

screen.style.display="none";

},5000);

}

function openGift(){

document.getElementById("msg").style.display="block";

}

function playMusic(){

const music=document.getElementById("music");

music.play();

  }
  </script>

</body>

</html>
